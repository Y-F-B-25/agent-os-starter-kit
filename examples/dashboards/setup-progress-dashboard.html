<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Agent OS Setup Dashboard</title>
  <style>
    :root {
      --ink: #172126;
      --muted: #647174;
      --line: #d8ded8;
      --bg: #f7f5ee;
      --panel: #ffffff;
      --blue: #1d5c83;
      --teal: #0f766e;
      --gold: #a16207;
      --green: #166534;
      --red: #b42318;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
    }

    main {
      max-width: 1080px;
      margin: 0 auto;
      padding: 28px;
    }

    header {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 18px;
      align-items: end;
      border-bottom: 1px solid var(--line);
      padding-bottom: 18px;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0;
      font-size: clamp(30px, 5vw, 56px);
      line-height: 1;
      letter-spacing: 0;
    }

    .subtitle {
      color: var(--muted);
      margin: 10px 0 0;
      font-size: 16px;
      line-height: 1.45;
    }

    .score {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
      min-width: 190px;
      text-align: right;
    }

    .score strong {
      display: block;
      font-size: 40px;
      line-height: 1;
    }

    .score span {
      display: block;
      margin-top: 6px;
      color: var(--muted);
      font-size: 13px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
    }

    .panel h2 {
      margin: 0 0 12px;
      font-size: 18px;
    }

    .meta {
      display: grid;
      gap: 10px;
    }

    .meta div {
      border-top: 1px solid #e8ece8;
      padding-top: 10px;
    }

    .meta strong {
      display: block;
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0;
      margin-bottom: 4px;
    }

    .meta span {
      font-size: 14px;
      line-height: 1.4;
    }

    .quest-list {
      display: grid;
      gap: 10px;
    }

    .quest {
      display: grid;
      grid-template-columns: 42px minmax(0, 1fr) 104px;
      gap: 10px;
      align-items: center;
      border: 1px solid #e5ebe6;
      border-radius: 8px;
      padding: 10px;
    }

    .quest code {
      background: #eef2ee;
      border-radius: 6px;
      padding: 5px 7px;
      font-weight: 800;
      color: #334045;
    }

    .quest b {
      display: block;
      font-size: 14px;
    }

    .quest small {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      line-height: 1.35;
    }

    .status {
      border-radius: 999px;
      padding: 6px 8px;
      text-align: center;
      font-size: 12px;
      font-weight: 800;
    }

    .completed {
      background: #e5f2df;
      color: var(--green);
    }

    .in_progress {
      background: #f6edc9;
      color: var(--gold);
    }

    .not_started {
      background: #e8eef1;
      color: var(--blue);
    }

    .blocked {
      background: #fce8e6;
      color: var(--red);
    }

    .bar {
      height: 10px;
      background: #e6ebe6;
      border-radius: 999px;
      overflow: hidden;
      margin-top: 14px;
    }

    .fill {
      height: 100%;
      background: var(--teal);
      border-radius: inherit;
    }

    .wide {
      grid-column: 1 / -1;
    }

    @media (max-width: 820px) {
      header,
      .grid {
        grid-template-columns: 1fr;
      }

      .score {
        text-align: left;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <h1>Agent OS Setup</h1>
        <p class="subtitle" id="success-test"></p>
      </div>
      <div class="score">
        <strong id="progress-score">0/0</strong>
        <span>quests completed</span>
        <div class="bar"><div class="fill" id="progress-fill" style="width: 0%;"></div></div>
      </div>
    </header>

    <div class="grid">
      <section class="panel">
        <h2>Profile</h2>
        <div class="meta">
          <div><strong>Lane</strong><span id="lane"></span></div>
          <div><strong>Profile</strong><span id="profile"></span></div>
          <div><strong>Lead agent</strong><span id="lead-agent"></span></div>
        </div>
      </section>

      <section class="panel">
        <h2>Status</h2>
        <div class="meta">
          <div><strong>Next action</strong><span id="next-action"></span></div>
          <div><strong>Current blocker</strong><span id="blocker"></span></div>
          <div><strong>Last updated</strong><span id="last-updated"></span></div>
        </div>
      </section>

      <section class="panel">
        <h2>Checks</h2>
        <div class="meta">
          <div><strong>Handoff</strong><span id="handoff"></span></div>
          <div><strong>Vault Lint</strong><span id="vault-lint"></span></div>
          <div><strong>Security</strong><span id="security"></span></div>
        </div>
      </section>

      <section class="panel wide">
        <h2>Quests</h2>
        <div class="quest-list" id="quests"></div>
      </section>
    </div>
  </main>

  <script id="progress-data" type="application/json">
{
  "last_updated": "replace-with-iso-timestamp",
  "setup_lane": "codex",
  "diagnostic": {
    "profile": "Builder",
    "success_test": "A Chief of Staff can resume from a handoff without prior chat."
  },
  "team": {
    "lead_agent": "Chief of Staff"
  },
  "eval": {
    "handoff_test": "not_run",
    "vault_lint": "not_run",
    "security_review": "not_run"
  },
  "dashboard": {
    "next_action": "Run Q1 vault foundation.",
    "blocker": "None"
  },
  "syllabus": {
    "quests": [
      {"id": "Q0", "name": "Plan and dashboard", "status": "completed", "description": "Confirm lane and write progress file."},
      {"id": "Q1", "name": "Vault foundation", "status": "in_progress", "description": "Create the vault structure and BRAIN_INDEX."},
      {"id": "Q2", "name": "Coordination layer", "status": "not_started", "description": "Create VaultBus status and inbox folders."},
      {"id": "Q3", "name": "Dashboard", "status": "not_started", "description": "Create Notion or local HTML dashboard."},
      {"id": "Q4", "name": "Chief of Staff", "status": "not_started", "description": "Write the first admin prompt."},
      {"id": "Q5", "name": "Specialist agent", "status": "not_started", "description": "Write the first specialist prompt."},
      {"id": "Q6", "name": "Handoff loop", "status": "not_started", "description": "Test save-up and resume."},
      {"id": "Q7", "name": "Quality checks", "status": "not_started", "description": "Run lint, eval, and security checks."},
      {"id": "Q8", "name": "Optional power tools", "status": "not_started", "description": "Add retrieval, watcher, automations, or blended lane."}
    ]
  }
}
  </script>
  <script>
    const data = JSON.parse(document.getElementById("progress-data").textContent);
    const quests = data.syllabus.quests;
    const completed = quests.filter((quest) => quest.status === "completed").length;
    const total = quests.length;
    const pct = total ? Math.round((completed / total) * 100) : 0;

    document.getElementById("progress-score").textContent = `${completed}/${total}`;
    document.getElementById("progress-fill").style.width = `${pct}%`;
    document.getElementById("success-test").textContent = data.diagnostic.success_test || "No success test set yet.";
    document.getElementById("lane").textContent = data.setup_lane || "Not selected";
    document.getElementById("profile").textContent = data.diagnostic.profile || "Not selected";
    document.getElementById("lead-agent").textContent = data.team.lead_agent || "Not selected";
    document.getElementById("next-action").textContent = data.dashboard.next_action || "No next action set.";
    document.getElementById("blocker").textContent = data.dashboard.blocker || "None";
    document.getElementById("last-updated").textContent = data.last_updated || "Not set";
    document.getElementById("handoff").textContent = data.eval.handoff_test || "not_run";
    document.getElementById("vault-lint").textContent = data.eval.vault_lint || "not_run";
    document.getElementById("security").textContent = data.eval.security_review || "not_run";

    const questList = document.getElementById("quests");
    questList.textContent = "";
    quests.forEach((quest) => {
      const className = quest.status || "not_started";
      const label = className.replace("_", " ");
      const article = document.createElement("article");
      const questId = document.createElement("code");
      const copy = document.createElement("div");
      const name = document.createElement("b");
      const description = document.createElement("small");
      const status = document.createElement("span");

      article.className = "quest";
      questId.textContent = quest.id;
      name.textContent = quest.name;
      description.textContent = quest.description || "";
      status.className = `status ${className}`;
      status.textContent = label;

      copy.append(name, description);
      article.append(questId, copy, status);
      questList.append(article);
    });
  </script>
</body>
</html>
